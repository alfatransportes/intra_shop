<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>{{ title|default:site_name }}</title>
    </head>
    <body style="margin:0;
                 padding:0;
                 background-color:#f3f4f6;
                 font-family:Arial, Helvetica, sans-serif;
                 color:#111827">
        <table role="presentation"
               width="100%"
               cellpadding="0"
               cellspacing="0"
               border="0"
               style="background-color:#f3f4f6;
                      margin:0;
                      padding:24px 0">
            <tr>
                <td align="center">
                    <table role="presentation"
                           width="640"
                           cellpadding="0"
                           cellspacing="0"
                           border="0"
                           style="width:640px;
                                  max-width:640px;
                                  background:#ffffff;
                                  border-radius:10px;
                                  overflow:hidden">
                        <tr>
                            <td style="background:#111827; padding:24px 32px;">
                                <div style="font-size:22px;
                                            line-height:28px;
                                            color:#ffffff;
                                            font-weight:bold">{{ site_name }}</div>
                                <div style="font-size:13px;
                                            line-height:20px;
                                            color:#d1d5db;
                                            margin-top:4px">Atualização do seu pedido</div>
                            </td>
                        </tr>
                        <tr>
                            <td style="padding:32px;">
                                {% block content %}{% endblock %}
                            </td>
                        </tr>
                        <tr>
                            <td style="padding:20px 32px;
                                       background:#f9fafb;
                                       border-top:1px solid #e5e7eb">
                                <div style="font-size:12px; line-height:18px; color:#6b7280;">Este é um e-mail automático do sistema.</div>
                                <div style="font-size:12px;
                                            line-height:18px;
                                            color:#6b7280;
                                            margin-top:6px">
                                    <a href="{{ site_url }}" style="color:#374151; text-decoration:none;">{{ site_url }}</a>
                                </div>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
