<aside class="sidebar sidebar-premium border-end d-none d-lg-flex flex-column">
    {# ===== HEADER FIXO ===== #}
    <div class="sidebar-header px-3 py-3 border-bottom">
        <div class="d-flex align-items-center justify-content-between w-100">
            <span class="fw-semibold sidebar-title">Navegação</span>
            <button class="btn btn-sm btn-outline-secondary sidebar-toggle"
                    id="sidebarCollapse"
                    type="button">
                <i class="bi bi-layout-sidebar-inset"></i>
            </button>
        </div>
    </div>
    {# ===== BODY (SCROLL) ===== #}
    <div class="sidebar-body p-2 flex-grow-1">
        {# ===== MENU ===== #}
        <div class="nav flex-column nav-pills gap-1 mt-2">
            <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}"
               href="">
                <i class="bi bi-speedometer2"></i><span class="link-text">Visão Geral</span>
            </a>
        </div>
    </div>
    {# ===== FOOTER FIXO ===== #}
    <div class="sidebar-footer p-3 border-top small text-secondary d-flex align-items-center justify-content-between">
        <span class="badge text-bg-secondary">v1.0</span>
        {% if menu_propriedade_atual_id %}
            <span class="small text-secondary text-truncate sidebar-max-width-200">
                <i class="bi bi-pin-map me-1"></i>{{ menu_propriedade_atual_nome }}
            </span>
        {% endif %}
    </div>
</aside>
<!-- Mobile offcanvas -->
<div class="offcanvas offcanvas-start d-lg-none"
     tabindex="-1"
     id="sidebarOffcanvas">
    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title">Navegação</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-2">
        <div class="nav flex-column nav-pills gap-1">
            <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}"
               href="">
                <i class="bi bi-speedometer2 me-2"></i><span class="link-text">Visão Geral</span>
            </a>
        </div>
    </div>
</div>
