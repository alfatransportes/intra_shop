{% extends "accounts/base.html" %}

{% block title %}E-mail enviado{% endblock %}

{% block conteudo %}
<main class="mt-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4 p-md-5 text-center">
                        <h1 class="h4 mb-3">Verifique seu e-mail</h1>
                        <p class="text-muted mb-0">
                            Se existir uma conta com o e-mail informado, você receberá um link para redefinir sua senha.
                        </p>

                        <div class="mt-4">
                            <a href="{% url 'login' %}" class="btn btn-link text-danger-alfa login-link">
                                Voltar para o login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}
