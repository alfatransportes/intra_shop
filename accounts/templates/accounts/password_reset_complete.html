{% extends "accounts/base.html" %}

{% block title %}Senha redefinida{% endblock %}

{% block conteudo %}
<main class="mt-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4 p-md-5 text-center">
                        <h1 class="h4 mb-3">Senha redefinida com sucesso</h1>
                        <p class="text-muted mb-4">
                            Sua senha foi alterada. Agora você já pode entrar com a nova senha.
                        </p>

                        <a href="{% url 'login' %}" class="btn btn-link text-danger-alfa login-link">
                            Ir para o login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}
