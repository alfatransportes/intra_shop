{% load static %}
{% load custom_tags %}

<div id="consentBanner" class="position-fixed bottom-0 start-0 end-0 z-3 d-none">
    <div class="container py-3">
        <div
            class="alert alert-light border shadow-sm rounded-3 mb-0 d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">

            <!-- Texto -->
            <div class="small text-muted flex-grow-1">
                <strong>Privacidade & Preferências</strong><br>
                Usamos cookies e, com sua permissão, localização e preferências de imagem para melhorar sua
                experiência.
            </div>

            <!-- Botões -->
            <div class="d-flex  justify-content-end align-items-center gap-2">
                <button id="btnRecusarTudo" type="button"
                    class="btn btn-link text-danger-alfa btn-sm text-decoration-none px-2">
                    Recusar
                </button>

                <button id="btnConfigurar" type="button" class="btn btn-secundario btn-sm"
                    data-bs-toggle="offcanvas" data-bs-target="#consentOffcanvas">
                    Configurar
                </button>

                <button id="btnAceitarTudo" type="button" class="btn btn-alfa btn-sm">
                    Aceitar tudo
                </button>
            </div>

        </div>
    </div>
</div>


<div class="offcanvas offcanvas-bottom rounded-top-4 border-0" tabindex="-1" id="consentOffcanvas"
aria-labelledby="consentOffcanvasLabel" data-bs-scroll="true" style="--bs-offcanvas-height: 90vh;">
<div class="offcanvas-header">
    <h5 class="offcanvas-title" id="consentOffcanvasLabel">Preferências de privacidade</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Fechar"></button>
</div>
<div class="offcanvas-body">
    <!-- Localização -->
    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="consentGeo">
        <label class="form-check-label" for="consentGeo">
            Permitir acesso à <strong>minha localização</strong> (recursos baseados em localização)
        </label>
    </div>

    <!-- Política de Imagem -->
    <div class="mb-2 fw-semibold">Política de Imagem</div>

    <div class="form-check mb-2">
        <input class="form-check-input" type="checkbox" id="selectAllImages">
        <label class="form-check-label" for="selectAllImages">Permitir todas as opções abaixo</label>
    </div>

    <div class="row row-cols-1 row-cols-md-2 g-2">
        <div class="col">
            <div class="form-check">
                <input class="form-check-input img-opt" type="checkbox" id="imgPerfil">
                <label class="form-check-label" for="imgPerfil">Exibir minha imagem no perfil e telas do
                    produto</label>
            </div>
        </div>
        <div class="col">
            <div class="form-check">
                <input class="form-check-input img-opt" type="checkbox" id="imgListagensPublicas">
                <label class="form-check-label" for="imgListagensPublicas">Exibir minha imagem em listagens
                    públicas</label>
            </div>
        </div>
        <div class="col">
            <div class="form-check">
                <input class="form-check-input img-opt" type="checkbox" id="imgUploads">
                <label class="form-check-label" for="imgUploads">Permitir upload de imagens</label>
            </div>
        </div>
        <div class="col">
            <div class="form-check">
                <input class="form-check-input img-opt" type="checkbox" id="imgAnalise">
                <label class="form-check-label" for="imgAnalise">Permitir análise automática de imagens</label>
            </div>
        </div>
        <div class="col">
            <div class="form-check">
                <input class="form-check-input img-opt" type="checkbox" id="imgParceiros">
                <label class="form-check-label" for="imgParceiros">Compartilhar imagens com parceiros
                    selecionados</label>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2 mt-4">
        <button class="btn btn-secundario" data-bs-dismiss="offcanvas">Cancelar</button>
        <button id="btnSalvarPrefs" type="button" class="btn btn-alfa">Salvar preferências</button>
    </div>
    <div class="small text-muted mt-3">
        Ao salvar, você concorda com nossos <a href="" target="_blank">Termos de
            Uso</a>.
    </div>
</div>
</div>
